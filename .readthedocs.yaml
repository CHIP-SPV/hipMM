version: 2

build:
   os: ubuntu-22.04
   tools:
      python: "miniconda-latest"
   apt_packages:
     - "doxygen"
     - "graphviz" # For dot graphs in doxygen

conda:
  environment: conda/environments/install_rocm-latest_arch-x86_64.yaml

python:
   install:
   - requirements: docs/sphinx/requirements.txt

sphinx:
   configuration: docs/conf.py

formats: []
